name: Build and Test

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    # if you fork this repo, you should change this to ubuntu-latest
    # you should also disable ipv6 tests, and the android tests
    # (the self-hosted tests have ipv6 on the host and a phone attached to the runner)
    runs-on: self-hosted
    env:
      HAS_OP_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN != '' }}
      SAIR_ORCHESTRATOR_URL: http://sair-orchestrator:8081
    steps:
      - uses: actions/checkout@v6
      - name: set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
#          cache: gradle # https://github.com/actions/setup-java/issues/683
      - name: Display host of runner
        run: echo $HOST_NAME
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Load secrets from 1Password
        if: env.HAS_OP_TOKEN == 'true'
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          WIFI_SSID: op://Infrastructure/Wi-Fi/username
          WIFI_PASSWORD: op://Infrastructure/Wi-Fi/password
          SAIR_API_KEY: op://Infrastructure/sair-api-key/credential

      - name: Acquire device lock
        if: env.HAS_OP_TOKEN == 'true'
        run: |
          curl -sfL https://raw.githubusercontent.com/compscidr/sair/main/tools/sair-acquire -o /tmp/sair-acquire
          curl -sfL https://raw.githubusercontent.com/compscidr/sair/main/tools/sair-release -o /tmp/sair-release
          chmod +x /tmp/sair-acquire /tmp/sair-release
          ACQUIRE_OUTPUT=$(/tmp/sair-acquire)
          eval "$ACQUIRE_OUTPUT"
          echo "SAIR_LOCK_ID=${SAIR_LOCK_ID}" >> $GITHUB_ENV
          echo "SAIR_HEARTBEAT_PID=${SAIR_HEARTBEAT_PID}" >> $GITHUB_ENV
          echo "SAIR_SERIALS=${SAIR_SERIALS}" >> $GITHUB_ENV

      - name: Connect phone to Wi-Fi
        if: env.HAS_OP_TOKEN == 'true'
        run: |
          adb shell cmd wifi connect-network "$WIFI_SSID" wpa2 "$WIFI_PASSWORD"
      - name: Clear Wi-Fi password from environment
        if: env.HAS_OP_TOKEN == 'true'
        run: echo "WIFI_PASSWORD=" >> "$GITHUB_ENV"
      - name: Build and Publish the Common Library to the local Maven repository
        run: ./gradlew :icmp-common:publishToMavenLocal
      - name: Build and Publish the Android and Linux Libraries to the local Maven repository
        run: ./gradlew :icmp-android:publishToMavenLocal :icmp-linux:publishToMavenLocal
      - name: Build with Gradle
        run: ./gradlew assemble          # we don't use build because that will run the tests, we want that separate
      - name: JVM Unit tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: ./gradlew check

      - name: Uninstall stale APKs
        if: env.HAS_OP_TOKEN == 'true'
        run: |
          adb devices | grep -w device | awk '{print $1}' | while read serial; do
            adb -s "$serial" uninstall com.jasonernst.icmp_lib || true
            adb -s "$serial" uninstall com.jasonernst.icmp_lib.test || true
          done

      - name: Android Instrumented tests # disable if you don't have a phone attached to the runner
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: ./gradlew connectedCheck

      - name: Upload ICMP Common Unit Tests Report to CodeCov
        # https://github.com/codecov/codecov-action
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: commonunittests
          files: ./icmp-common/build/reports/jacoco/test/jacocoTestReport.xml
      - name: Upload ICMP Linux Unit Tests Report to CodeCov
        # https://github.com/codecov/codecov-action
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: linuxunittests
          files: ./icmp-linux/build/reports/jacoco/test/jacocoTestReport.xml
      - name: Upload Instrumented Tests Report to CodeCov
        # https://github.com/codecov/codecov-action
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: instrumentedtests
          files: ./icmp-android/build/reports/coverage/androidTest/debug/connected/report.xml
      - name: Disconnect phone from Wi-Fi
        if: always()
        run: |
          if [ -n "$WIFI_SSID" ]; then
            adb shell cmd wifi forget-network "$WIFI_SSID"
          else
            echo "WIFI_SSID is not set; skipping Wi-Fi disconnect."
          fi
      - name: Release device lock
        if: always() && env.HAS_OP_TOKEN == 'true'
        run: /tmp/sair-release
